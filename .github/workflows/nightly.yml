name: Nightly Target PID Matrix

on:
  schedule:
    # 3:15am Pacific daily (adjust if you want)
    - cron: "15 11 * * *"
  workflow_dispatch:

jobs:
  run-matrix:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run matrix + expected validation
        env:
          # If your scripts read these
          EDGE_CONFIG_ID: fec951b9-1d4b-4625-80dd-0bbd0d764a4f
        run: |
          set -e
          python3 run_matrix.py config/base_request_ios.json config/matrix_ios.json config/expected_ios.json | tee out.log

      - name: Upload run log
        uses: actions/upload-artifact@v4
        with:
          name: matrix-log
          path: out.log

      - name: Post Slack (only on failure)
        if: failure()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          python3 scripts/post_slack.py out.log

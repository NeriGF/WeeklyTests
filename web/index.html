<!doctype html>
<html>
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Target PID Matrix</title>
  <style>
    body { font-family: -apple-system, system-ui, sans-serif; margin: 24px; }
    .meta { opacity: 0.75; margin-bottom: 16px; }
    table { border-collapse: collapse; width: 100%; }
    th, td { border: 1px solid #ddd; padding: 10px; vertical-align: top; }
    th { text-align: left; background: #f6f6f6; }
    .ok { background: #eaffea; }
    .bad { background: #ffecec; }
    code { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 12px; }
  </style>
</head>
<body>
  <h1>Target PID Matrix</h1>
  <div class="meta" id="meta"></div>
  <table id="tbl">
    <thead>
      <tr>
        <th>Scenario</th>
        <th>Inputs</th>
        <th>Activity / Experience</th>
        <th>Delivered product_ids</th>
        <th>Status</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>

  <script src="app.js"></script>
</body>
</html>
